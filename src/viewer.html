<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LaTeX Preview</title>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>

  <body>
    <iframe id="pdf" src="./main.pdf"></iframe>

    <script>
      let lastSeen = 0;

      async function check() {
        try {
          const res = await fetch("/status");
          const data = await res.json();

          if (data.lastBuildTime !== lastSeen) {
            lastSeen = data.lastBuildTime;

            const iframe = document.getElementById("pdf");
            iframe.src = "/main.pdf?cache=" + Date.now();
          }
        } catch (e) {}
      }

      setInterval(check, 800);
    </script>
  </body>
</html>
